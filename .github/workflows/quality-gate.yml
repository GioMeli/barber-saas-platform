name: Velliqo Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static validators
        run: |
          npm run production:check
          npm run translations:check
          npm run ui:check
          npm run sales:check
          npm run finance:check
          npm run marketing:check

      - name: TypeScript
        run: npm run typecheck

      - name: Production build
        run: npm run build
