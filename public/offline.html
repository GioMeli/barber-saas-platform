<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#030614" />
    <title>Velliqo — Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 20% 10%, rgba(139,92,246,.28), transparent 35%), #030614; color: white; padding: 24px; }
      main { width: min(100%, 520px); border: 1px solid rgba(255,255,255,.12); border-radius: 28px; background: rgba(17,16,39,.9); padding: 32px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,.35); }
      img { width: 84px; height: 84px; border-radius: 24px; }
      h1 { margin: 22px 0 10px; font-size: 28px; }
      p { margin: 0; color: rgba(255,255,255,.68); line-height: 1.7; }
      button { margin-top: 24px; border: 0; border-radius: 14px; padding: 12px 18px; font: inherit; font-weight: 700; cursor: pointer; color: #0b1020; background: white; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="Velliqo" />
      <h1>You are offline</h1>
      <p>Reconnect to continue loading live appointments, customers, payments and business data. Velliqo does not store sensitive business records in the offline cache.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
